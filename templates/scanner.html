<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner - HC Alimentos</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; border-radius: 10px; background: white; padding: 10px; box-shadow: 0px 4px 6px rgba(0,0,0,0.1); }
        .resultado-box { margin-top: 20px; padding: 15px; background-color: #e2e8f0; border-radius: 8px; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Escáner Operativo</h2>
    
    <div id="reader"></div>
    
    <div class="resultado-box" id="resultado-texto">
        Esperando lectura de QR...
    </div>

    <script>
        function lecturaExitosa(textoDecodificado, resultadoDecodificado) {
            document.getElementById('resultado-texto').innerText = "QR Detectado: " + textoDecodificado;
            html5QrcodeScanner.pause(true);
            setTimeout(() => { html5QrcodeScanner.resume(); }, 3000);
        }

        var html5QrcodeScanner = new Html5QrcodeScanner(
            "reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        
        html5QrcodeScanner.render(lecturaExitosa);
    </script>
</body>
</html>
